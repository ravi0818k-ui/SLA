<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Confirmed - Super Learner Academy</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="Favicon SLA/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="Favicon SLA/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Favicon SLA/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Favicon SLA/apple-icon-180x180.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome 6.5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css?v=1.0.1">
</head>
<body class="thank-you-page" data-page="thank-you">

    <!-- ========== CONFETTI CONTAINER ========== -->
    <div id="confetti-container"></div>

    <!-- ========== THANK YOU CARD ========== -->
    <div class="thankyou-wrapper">
        <div class="thankyou-card">
            <!-- Green Header -->
            <div class="thankyou-header">
                <div class="thankyou-checkmark">
                    <i class="fas fa-check"></i>
                </div>
                <span class="thankyou-badge">REGISTRATION CONFIRMED</span>
                <h1>Thank You For Registering!</h1>
            </div>

            <!-- Card Body -->
            <div class="thankyou-body">
                <h2 class="thankyou-incomplete">Wait, your registration is incomplete...</h2>
                <p class="thankyou-subtitle">Please wait while we redirect you to the official WhatsApp community group.</p>

                <!-- Progress Bar -->
                <div class="redirect-progress">
                    <span class="redirect-label">Redirecting...</span>
                    <span class="redirect-percent" id="redirect-percent">0%</span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>

                <!-- WhatsApp Button -->
                <a href="#" class="whatsapp-join-btn" target="_blank" rel="noopener noreferrer" data-bind-href="whatsapp.link" id="whatsapp-btn" data-dynamic-only>
                    <i class="fab fa-whatsapp"></i> Join WhatsApp Group
                </a>

                <!-- Back to Homepage -->
                <a href="index.html" class="back-home-link">← Back to Homepage</a>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="script.js?v=1.0.1"></script>
</body>
</html>
